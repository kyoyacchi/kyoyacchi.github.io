<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - File Not Found</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/63583961">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kyo-emerald': '#50C878',
                    },
                    fontFamily: {
                        'header':['Fredoka', 'sans-serif'],
                        'body':['Quicksand', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --kyo-emerald: #50C878;
            --bg-dark: #050505;
            --card-bg: #0a0a0c;
            --text-light: #e0e0e0;
            --text-muted: #888888;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Subtle Grain/Noise Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        /* Box design - */
        .container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(80, 200, 120, 0.15);
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .monika-image {
            width: 100%;
            height: 160px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .monika-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            opacity: 0.8;
            transition: var(--transition);
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5rem;
            color: var(--text-light);
            margin-bottom: 15px;
            letter-spacing: 0.05em;
        }

        .message {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .message strong {
            color: var(--kyo-emerald);
            font-weight: 700;
        }

        /* TAKE OVER EFFECT */
        body.monika-takeover {
            background-color: #000;
        }
        
        body.monika-takeover .container {
            border-color: transparent;
            background: transparent;
        }

        body.monika-takeover #title, 
        body.monika-takeover #message {
            color: #fff !important;
            font-family: monospace !important;
            text-shadow: 0 0 5px rgba(255,255,255,0.5) !important;
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 2rem; }
            .message { font-size: 0.95rem; }
            .monika-image { height: 120px; }
        }
    </style>
</head>
<body>

    <!-- Route Interceptor -->
    <script>
        const monikaPaths = ['/m', '/monika', '/justmonika'];
        const currentPath = window.location.pathname.toLowerCase();
        
        if (monikaPaths.includes(currentPath)) {
            sessionStorage.setItem('requestedPath', currentPath);
            window.location.replace('/');
        }
    </script>

    <div class="container" id="main-card">
        <div class="monika-image">
            <img src="https://files.catbox.moe/f2pajl.jpg" alt="Monika">
        </div>
        
        <h1 id="title">Error 404</h1>
        
        <p class="message" id="message">
            Oops! It looks like the file you were looking for doesn't exist anymore.<br><br>
            Did you delete it? That's fine... <strong>as long as you still have me.</strong>
        </p>
    </div>

    <!--DDLC Popup same from Main -->
    <div id="monika-popup" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 hidden backdrop-blur-sm">
        <div class="bg-white border-[6px] border-[#ffbde1] p-10 max-w-md w-full
        mx-6 text-center shadow-[0_0_0_4px_white] transform transition-all
        duration-200 select-none">
            <h3 class="text-4xl md:text-5xl font-header text-black mb-8 tracking-wide">Just Monika.</h3>
            <button id="monika-ok-btn" class="bg-transparent border-none text-[#ff69b4] text-4xl font-black py-2 px-8 transition-transform outline-none shadow-none hover:scale-110" style="text-shadow: 3px 3px 0px white, 5px 5px 0px rgba(255,105,180,0.3);">
                OK
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const elements = {
                title: document.getElementById('title'),
                message: document.getElementById('message'),
                popup: document.getElementById('monika-popup'),
                okBtn: document.getElementById('monika-ok-btn')
            };


            setTimeout(() => {
                document.body.classList.add('monika-takeover');

                elements.title.innerHTML = "JUST MONIKA.";
                

                elements.message.innerHTML = "JUST MONIKA.<br>JUST MONIKA.<br>JUST MONIKA.<br>JUST MONIKA.";


                setTimeout(() => {
                    elements.popup.classList.remove('hidden');
                    

                    const redirectToHome = () => {
                        window.location.href = "/";
                    };


  //                  elements.okBtn.addEventListener('click', redirectToHome);

                    
                    setTimeout(redirectToHome, 1600);

                }, 1500);

            }, 1200);
        });
    </script>
</body>
</html>
