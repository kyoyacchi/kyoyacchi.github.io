    <script>
    // ========================================
// CONFIGURATION
// ========================================
const DISCORD_USER_ID = '468509605828493322';
const CONFIG = {
    MAX_BACKOFF: 30000,
    CACHE_TTL: 60000 * 5,
    SWR_THRESHOLD: 120000,
    CONNECT_DEBOUNCE: 1500,
    INIT_TIMEOUT: 10000,
    REVALIDATE_TIMEOUT: 8000,
    RENDER_DEBOUNCE: 150,
    FALLBACK_TIMEOUT: 8000
};

// ========================================
// STATE
// ========================================
const state = {
    ws: null,
    isConnected: false,
    isConnecting: false,
    reconnectTimer: null,
    heartbeatInterval: null,
    backoff: 1000,
    currentSessionID: null,
    lastConnectAttempt: 0,
    renderDebounceTimer: null,
    hasTyped: false,
    activityUpdateToken: 0,
    visibilityTimeout: null
};

// Cache DOM elements once
const DOM = {
    card: null,
    avatar: null,
    name: null,
    username: null,
    activity: null,
    statusInd: null,
    videoBg: null,
    imgBg: null,
    typeTarget: null,
    year: null
};

// ========================================
// UTILITY: FETCH WITH TIMEOUT
// ========================================
async function fetchWithTimeout(url, timeout = 8000) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeout);

    try {
        const res = await fetch(url, { signal: controller.signal });
        return res;
    } finally {
        clearTimeout(timeoutId);
    }
}

// ========================================
// CACHE MANAGEMENT (WITH TTL + SWR)
// ========================================
const storageKey = `lanyard_cache_${DISCORD_USER_ID}`;

function getCacheWithMeta() {
    try {
        const stored = localStorage.getItem(storageKey);
        if (!stored) return null;
        return JSON.parse(stored);
    } catch (e) {
        console.warn('Cache read failed:', e);
        return null;
    }
}

function getCache() {
    const cached = getCacheWithMeta();
    if (!cached) return null;

    // Check if expired
    if (Date.now() - cached.timestamp > CONFIG.CACHE_TTL) {
        return null;
    }

    return cached.data;
}

function setCache(data) {
    try {
        localStorage.setItem(storageKey, JSON.stringify({
            data: data,
            timestamp: Date.now()
        }));
    } catch (e) {
        console.warn('Cache write failed:', e);
    }
}

// ========================================
// ACTIVITY DISPLAY LOGIC
// ========================================
function getActivityDisplay(status, activities = []) {
    if (status === 'offline') {
        return { text: "OFFLINE", color: "text-white" };
    }

    const game = activities.find(a => a.type === 0 || a.type === 1);
    const listeningActivity = activities.find(a => a.type === 2);

    if (game) {
        return { 
            text: "PLAYING " + game.name.toUpperCase(), 
            color: "text-kyo-emerald" 
        };
    }

    if (listeningActivity) {
        return { 
            text: "LISTENING TO " + listeningActivity.name.toUpperCase(), 
            color: "text-kyo-emerald" 
        };
    }

    const statusText = status === 'dnd' ? "DO NOT DISTURB" : status.toUpperCase();
    return { text: statusText, color: "text-white" };
}

// ========================================
// CONNECTION STATE FEEDBACK (DDLC META)
// ========================================
function showConnectionError() {
    if (!DOM.activity) return;
    
    DOM.activity.textContent = "MONIKA IS TRYING TO RECONNECT...";
    DOM.activity.className = "text-[10px] md:text-xs font-bold tracking-widest uppercase px-3 py-2 rounded-xl bg-red-500/20 border border-red-500/40 backdrop-blur-md whitespace-normal break-words w-fit max-w-full leading-relaxed text-red-400 animate-pulse transition-opacity duration-300";
    DOM.activity.style.opacity = '1';
}

function clearConnectionError() {
    if (!DOM.activity) return;
    DOM.activity.classList.remove('animate-pulse');
}

// ========================================
// RENDER PRESENCE
// ========================================
function debouncedRenderPresence(data) {
    if (state.renderDebounceTimer) {
        cancelAnimationFrame(state.renderDebounceTimer);
    }
    state.renderDebounceTimer = requestAnimationFrame(() => {
        renderPresence(data);
        state.renderDebounceTimer = null;
    });
}

function renderPresence(data) {
    if (!data || !data.discord_user || !DOM.card) return;

    const user = data.discord_user;
    const status = data.discord_status || 'offline';

    DOM.card.classList.remove('opacity-0');

    // Avatar with preload
    const avatarUrl = user.avatar 
        ? `https://wsrv.nl/?url=https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=256`
        : `https://wsrv.nl/?url=https://cdn.discordapp.com/embed/avatars/0.png`;

    if (DOM.avatar.src !== avatarUrl) {
        const img = new Image();
        img.onload = () => {
            DOM.avatar.src = avatarUrl;
        };
        img.src = avatarUrl;
    }

    // Status indicator
    DOM.statusInd.className = `status-indicator status-${status}`;

    // Name and username (prevent unnecessary DOM writes)
    const displayName = user.global_name || user.username;
    if (DOM.name.textContent !== displayName) {
        DOM.name.textContent = displayName;
    }

    const usernameDisplay = '@' + user.username;
    if (DOM.username.textContent !== usernameDisplay) {
        DOM.username.textContent = usernameDisplay;
    }

    // Activity with smooth transition (race condition guard)
    const activity = getActivityDisplay(status, data.activities);
    const currentToken = ++state.activityUpdateToken;
    
    if (DOM.activity.textContent !== activity.text) {
        // Fade out
        DOM.activity.style.opacity = '0';
        
        setTimeout(() => {
            // Cancel if newer update arrived
            if (currentToken !== state.activityUpdateToken) return;
            
            DOM.activity.textContent = activity.text;
            
            const activityClasses = `text-[10px] md:text-xs font-bold tracking-widest uppercase px-3 py-2 rounded-xl bg-white/10 border border-white/5 backdrop-blur-md whitespace-normal break-words w-fit max-w-full leading-relaxed transition-opacity duration-300 ${activity.color === 'text-kyo-emerald' ? 'text-kyo-emerald border-kyo-emerald/20' : 'text-white'}`;
            
            DOM.activity.className = activityClasses;
            
            // Clear any connection error animations
            clearConnectionError();
            
            // Fade in
            DOM.activity.style.opacity = '1';
        }, 150);
    }

    // Background (nameplate video or banner)
    let videoUrl = null;
    if (user.collectibles && user.collectibles.nameplate && user.collectibles.nameplate.asset) {
        videoUrl = `https://kyopi.vercel.app/api/proxy?url=https://cdn.discordapp.com/assets/collectibles/${user.collectibles.nameplate.asset}asset.webm`;
    }

    if (videoUrl) {
        if (DOM.videoBg.src !== videoUrl) DOM.videoBg.src = videoUrl;
        DOM.videoBg.classList.remove('hidden');
        DOM.imgBg.classList.add('hidden');
    } else if (user.banner) {
        const bannerUrl = `https://kyopi.vercel.app/api/proxy?url=https://cdn.discordapp.com/banners/${user.id}/${user.banner}.${user.banner.startsWith('a_') ? 'gif' : 'png'}?size=1024`;
        
        // Preload banner
        const img = new Image();
        img.onload = () => {
            DOM.imgBg.src = bannerUrl;
        };
        img.src = bannerUrl;
        
        DOM.imgBg.classList.remove('hidden');
        DOM.videoBg.classList.add('hidden');
    } else {
        DOM.imgBg.style.background = '#50c878';
        DOM.imgBg.src = '';
        DOM.imgBg.classList.remove('hidden');
        DOM.videoBg.classList.add('hidden');
    }
}

// ========================================
// WEBSOCKET CLEANUP (FIX MEMORY LEAKS)
// ========================================
function cleanupConnection() {
    if (state.ws) {
        state.ws.onopen = null;
        state.ws.onmessage = null;
        state.ws.onerror = null;
        state.ws.onclose = null;
        state.ws.close();
        state.ws = null;
    }

    if (state.heartbeatInterval) {
        clearInterval(state.heartbeatInterval);
        state.heartbeatInterval = null;
    }
    
    if (state.reconnectTimer) {
        clearTimeout(state.reconnectTimer);
        state.reconnectTimer = null;
    }
}

// ========================================
// LANYARD CONNECTION (WITH SWR)
// ========================================
async function connectLanyard() {
    const now = Date.now();
    if (now - state.lastConnectAttempt < CONFIG.CONNECT_DEBOUNCE) return;
    state.lastConnectAttempt = now;

    if (state.isConnecting || state.isConnected) return;
    state.isConnecting = true;

    // Clean up any existing connection first
    cleanupConnection();

    // SWR: Use cache immediately if available
    const cached = getCacheWithMeta();
    if (cached && cached.data) {
        debouncedRenderPresence(cached.data);

        const isStale = Date.now() - cached.timestamp > CONFIG.SWR_THRESHOLD;
        
        if (!isStale) {
            // Fresh enough, skip fetch but still establish WebSocket
            state.isConnecting = false;
            establishWebSocket();
            return;
        }
        // If stale, continue to revalidate in background
    }

    // Fetch fresh data (revalidate)
    try {
        const res = await fetchWithTimeout(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
        const json = await res.json();
        if (json.success && json.data) {
            setCache(json.data);
            debouncedRenderPresence(json.data);
        }
    } catch (e) {
        console.warn('Initial fetch failed:', e);
        if (!cached) {
            showConnectionError();
        }
    }

    // Establish WebSocket
    establishWebSocket();
}

function establishWebSocket() {
    let ws;
    try {
        ws = new WebSocket('wss://api.lanyard.rest/socket');
    } catch (err) {
        console.warn('WebSocket creation failed:', err);
        state.isConnecting = false;
        showConnectionError();
        scheduleReconnect();
        return;
    }

    state.ws = ws;
    const sessionID = Math.random().toString(36);
    state.currentSessionID = sessionID;

    ws.onopen = () => {
        if (state.currentSessionID !== sessionID) return;
        state.isConnected = true;
        state.isConnecting = false;
        state.backoff = 1000;
        
        // Clear reconnect timer on success
        if (state.reconnectTimer) {
            clearTimeout(state.reconnectTimer);
            state.reconnectTimer = null;
        }

        ws.send(JSON.stringify({
            op: 2,
            d: { subscribe_to_id: DISCORD_USER_ID }
        }));
    };

    ws.onmessage = (event) => {
        if (state.currentSessionID !== sessionID) return;

        try {
            const msg = JSON.parse(event.data);

            if (msg.op === 1) {
                // Guard against duplicate heartbeat intervals
                if (state.heartbeatInterval) {
                    clearInterval(state.heartbeatInterval);
                }
                
                state.heartbeatInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ op: 3 }));
                    }
                }, msg.d.heartbeat_interval);
            }

            if (msg.t === 'INIT_STATE') {
                // Lanyard wraps presence in user ID key
                const presence = msg.d[DISCORD_USER_ID];
                if (presence) {
                    setCache(presence);
                    debouncedRenderPresence(presence);
                }
            } else if (msg.t === 'PRESENCE_UPDATE') {
                const presence = msg.d;
                if (presence) {
                    setCache(presence);
                    debouncedRenderPresence(presence);
                }
            }
        } catch (e) {
            console.warn('Message parse error:', e);
        }
    };

    ws.onerror = () => {
        if (state.currentSessionID !== sessionID) return;
        console.warn('WebSocket error');
        state.isConnected = false;
        state.isConnecting = false;
        showConnectionError();
        ws.close();
        scheduleReconnect();
    };

    ws.onclose = () => {
        if (state.currentSessionID !== sessionID) return;
        console.warn('WebSocket closed');
        state.isConnected = false;
        state.isConnecting = false;
        showConnectionError();
        scheduleReconnect();
    };
}

function scheduleReconnect() {
    if (state.reconnectTimer) return;
    
    const jitter = Math.floor(Math.random() * 1000);
    const wait = Math.min(state.backoff + jitter, CONFIG.MAX_BACKOFF);
    
    state.reconnectTimer = setTimeout(() => {
        state.reconnectTimer = null;
        connectLanyard();
    }, wait);
    
    // Smoother backoff curve
    state.backoff = Math.min(state.backoff * 1.3 + 200, CONFIG.MAX_BACKOFF);
}

// ========================================
// TITLE CHANGE (DDLC AESTHETIC)
// ========================================
const originalTitle = document.title;

// ========================================
// VISIBILITY CHANGE (DEBOUNCED)
// ========================================
document.addEventListener("visibilitychange", () => {
    clearTimeout(state.visibilityTimeout);
    
    state.visibilityTimeout = setTimeout(() => {
        if (document.hidden) {
            document.title = ".JUST MONIKA";
            cleanupConnection();
        } else {
            document.title = originalTitle;
            connectLanyard();
        }
    }, 100);
});

// ========================================
// TYPEWRITER EFFECT
// ========================================
function initTypewriter() {
    if (!DOM.typeTarget || state.hasTyped) return;
    state.hasTyped = true;
    
    const textToType = "Every day, I imagine a future where I can be with you.";
    let typeIndex = 0;

    function typeWriter() {
        if (typeIndex < textToType.length) {
            DOM.typeTarget.textContent += textToType[typeIndex++];
            setTimeout(typeWriter, 50);
        } else {
            setTimeout(() => DOM.typeTarget.classList.remove('cursor'), 2000);
        }
    }

    setTimeout(typeWriter, 800);
}

// ========================================
// MENU TOGGLE
// ========================================
function initMenu() {
    const menuBtn = document.getElementById('menu-btn');
    const navOverlay = document.getElementById('nav-overlay');
    const logo = document.getElementById('site-logo');
    
    if (!menuBtn || !navOverlay || !logo) return;
    
    const icon = menuBtn.querySelector('i');
    if (!icon) return;
    
    let isMenuOpen = false;

    function toggleMenu() {
        isMenuOpen = !isMenuOpen;
        if (isMenuOpen) {
            navOverlay.classList.add('open');
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-xmark');
            icon.style.transform = 'rotate(90deg)';
            document.body.style.overflow = 'hidden';
            logo.classList.add('opacity-0', 'pointer-events-none');
        } else {
            navOverlay.classList.remove('open');
            icon.classList.remove('fa-xmark');
            icon.classList.add('fa-bars');
            icon.style.transform = 'rotate(0deg)';
            document.body.style.overflow = 'auto';
            logo.classList.remove('opacity-0', 'pointer-events-none');
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
}

// ========================================
// MONIKA POPUP
// ========================================
function initMonikaPopup() {
    const monikaHero = document.getElementById('monika-hero');
    const monikaPopup = document.getElementById('monika-popup');
    const monikaOkBtn = document.getElementById('monika-ok-btn');

    if (!monikaHero || !monikaPopup || !monikaOkBtn) return;

    monikaHero.addEventListener('click', () => {
        monikaPopup.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    });

    monikaOkBtn.addEventListener('click', () => {
        monikaPopup.classList.add('hidden');
        document.body.style.overflow = 'auto';
    });
}

// ========================================
// INITIALIZATION
// ========================================
document.addEventListener('DOMContentLoaded', () => {
    // Cache DOM elements
    DOM.card = document.getElementById('discord-profile');
    DOM.avatar = document.getElementById('d-avatar');
    DOM.name = document.getElementById('d-global-name');
    DOM.username = document.getElementById('d-username');
    DOM.activity = document.getElementById('d-activity');
    DOM.statusInd = document.getElementById('d-status-indicator');
    DOM.videoBg = document.getElementById('d-bg-video');
    DOM.imgBg = document.getElementById('d-bg-image');
    DOM.typeTarget = document.getElementById('typed-quote');
    DOM.year = document.getElementById('year');

    // Set year
    if (DOM.year) {
        DOM.year.textContent = new Date().getFullYear();
    }

    // Initialize features
    initTypewriter();
    initMenu();
    initMonikaPopup();
    
    // Start Lanyard connection
    connectLanyard();
});
