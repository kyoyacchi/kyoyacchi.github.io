    <script>
// ========================================
// CONFIGURATION & STATE
// ========================================
const DISCORD_USER_ID = '468509605828493322';

const CONFIG = {
    MAX_BACKOFF: 30000,
    CACHE_TTL: 60000,
    SWR_THRESHOLD: 120000,
    CONNECT_DEBOUNCE: 1500,
    INIT_TIMEOUT: 10000,
    REVALIDATE_TIMEOUT: 8000,
    RENDER_DEBOUNCE: 150,
    FALLBACK_TIMEOUT: 3000  // Reduced from 8000
};

const state = {
    ws: null,
    isConnected: false,
    isConnecting: false,
    reconnectTimer: null,
    heartbeatInterval: null,
    initTimeout: null,
    renderDebounceTimer: null,
    fallbackTimeout: null,
    backoff: 1000,
    currentSessionID: null,
    lastConnectAttempt: 0,
    lastPresenceHash: null,
    hasEverConnected: false
};

const cache = {
    data: null,
    timestamp: 0,
    isRevalidating: false
};

// ========================================
// CACHE & UTILS
// ========================================
function setCache(data) {
    cache.data = data;
    cache.timestamp = Date.now();
    try { localStorage.setItem(`lanyard_${DISCORD_USER_ID}`, JSON.stringify({ data, timestamp: cache.timestamp })); } catch(e){}
}

function getCache() {
    if (!cache.data) {
        try {
            const stored = JSON.parse(localStorage.getItem(`lanyard_${DISCORD_USER_ID}`));
            if (stored) { cache.data = stored.data; cache.timestamp = stored.timestamp; }
        } catch(e){}
    }
    const age = Date.now() - cache.timestamp;
    if (age < CONFIG.CACHE_TTL) return cache.data;
    if (age < CONFIG.SWR_THRESHOLD && !cache.isRevalidating) {
        revalidateCache();
        return cache.data;
    }
    return null;
}

async function revalidateCache() {
    if (cache.isRevalidating) return;
    cache.isRevalidating = true;
    const ac = new AbortController();
    const timeout = setTimeout(() => ac.abort(), CONFIG.REVALIDATE_TIMEOUT);
    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`, { signal: ac.signal });
        const json = await res.json();
        if (json?.success && json.data) {
            if (presenceChanged(cache.data, json.data)) {
                setCache(json.data);
                renderPresence(json.data);  // Direct call, no debounce
            } else {
                setCache(json.data);
            }
        }
    } catch (err) {
        console.warn("Cache revalidation failed:", err);
    } finally {
        clearTimeout(timeout);
        cache.isRevalidating = false;
    }
}

function normalizeActivities(activities) {
    if (!Array.isArray(activities)) return [];
    return activities.filter(a => a && a.type !== 4).map(a => ({
        name: a.name || '', type: a.type, details: a.details || '', state: a.state || ''
    })).sort((a, b) => {
        if (a.type !== b.type) return a.type - b.type;
        return (a.name || '').localeCompare(b.name || '');
    });
}

function presenceChanged(oldP, newP) {
    if (!oldP || !newP) return true;
    if (oldP.discord_status !== newP.discord_status) return true;
    if ((oldP.discord_user?.avatar || '') !== (newP.discord_user?.avatar || '')) return true;
    const oldActs = normalizeActivities(oldP.activities);
    const newActs = normalizeActivities(newP.activities);
    if (oldActs.length !== newActs.length) return true;
    for (let i = 0; i < oldActs.length; i++) {
        if (oldActs[i].name !== newActs[i].name || oldActs[i].type !== newActs[i].type || 
            oldActs[i].details !== newActs[i].details || oldActs[i].state !== newActs[i].state) return true;
    }
    return false;
}

function getPresenceHash(data) {
    if (!data?.discord_user) return null;
    return JSON.stringify({
        status: data.discord_status,
        avatar: data.discord_user.avatar,
        username: data.discord_user.global_name || data.discord_user.username,
        activities: normalizeActivities(data.activities)
    });
}

// ========================================
// DOM UPDATES (MONIKA SPECIFIC)
// ========================================
function showConnectionError() {
    const actEl = document.getElementById('d-activity');
    if (!actEl) return;
    actEl.textContent = "MONIKA IS TRYING TO RECONNECT...";
    actEl.className = "text-[10px] md:text-xs font-bold tracking-widest uppercase px-3 py-2 rounded-xl bg-red-500/20 border border-red-500/40 backdrop-blur-md whitespace-normal break-words w-fit max-w-full leading-relaxed text-red-400 animate-pulse transition-opacity duration-300";
}

function renderPresence(data) {
    if (!data?.discord_user) return;
    
    const currentHash = getPresenceHash(data);
    if (currentHash === state.lastPresenceHash) return;
    state.lastPresenceHash = currentHash;

    const user = data.discord_user;
    const status = data.discord_status || 'offline';
    const activities = Array.isArray(data.activities) ? data.activities : [];

    // 1. Update Profile Text & Avatar
    document.getElementById('d-global-name').textContent = user.global_name || user.username;
    document.getElementById('d-username').textContent = '@' + user.username;
    
    const avatarUrl = user.avatar 
        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${user.avatar.startsWith('a_') ? 'gif' : 'webp'}?size=128`
        : `https://cdn.discordapp.com/embed/avatars/0.png`;
    document.getElementById('d-avatar').src = avatarUrl;
    document.getElementById('d-status-indicator').className = `status-indicator status-${status}`;

    // 2. Format Activity
    let activityText = "OFFLINE";
    let isHighlight = false;

    if (status !== 'offline') {
        const priority = { 2: 1, 0: 2, 1: 3 };
        const activity = activities.filter(a => a && a.type !== 4).sort((a, b) => (priority[a.type] ?? 99) - (priority[b.type] ?? 99))[0];

        if (activity) {
            isHighlight = true;
            if (activity.type === 0) activityText = `PLAYING ${activity.name.toUpperCase()}`;
            else if (activity.type === 2) activityText = `LISTENING TO ${activity.name.toUpperCase()}`;
            else activityText = activity.name.toUpperCase();
        } else {
            activityText = status === 'dnd' ? "DO NOT DISTURB" : status.toUpperCase();
        }
    }

    // INSTANT UPDATE - NO DELAYS
    const actEl = document.getElementById('d-activity');
    actEl.textContent = activityText;
    actEl.className = `text-[10px] md:text-xs font-bold tracking-widest uppercase px-3 py-2 rounded-xl bg-white/10 border border-white/5 backdrop-blur-md whitespace-normal break-words w-fit max-w-full leading-relaxed transition-opacity duration-300 ${isHighlight ? 'text-kyo-emerald border-kyo-emerald/20' : 'text-white'}`;

    // 3. Update Background (Nameplate / Banner)
    const videoBg = document.getElementById('d-bg-video');
    const imgBg = document.getElementById('d-bg-image');

    if (user.collectibles?.nameplate?.asset) {
        const safePath = user.collectibles.nameplate.asset.endsWith('/') ? user.collectibles.nameplate.asset : user.collectibles.nameplate.asset + '/';
        const targetUrl = `https://cdn.discordapp.com/assets/collectibles/${safePath}asset.webm`;
        videoBg.src = `https://kyopi.vercel.app/api/proxy?url=${encodeURIComponent(targetUrl)}`;
        videoBg.classList.remove('hidden');
        imgBg.classList.add('hidden');
    } else if (user.banner) {
        imgBg.src = `https://kyopi.vercel.app/api/proxy?url=${encodeURIComponent(`https://cdn.discordapp.com/banners/${user.id}/${user.banner}.${user.banner.startsWith('a_') ? 'gif' : 'webp'}?size=1024`)}`;
        imgBg.classList.remove('hidden');
        videoBg.classList.add('hidden');
    } else {
        imgBg.style.background = '#0a0a0c';
        imgBg.src = '';
        imgBg.classList.remove('hidden');
        videoBg.classList.add('hidden');
    }
}

// ========================================
// WEBSOCKET LOGIC
// ========================================
function clearTimers() {
    if (state.reconnectTimer) clearTimeout(state.reconnectTimer);
    if (state.heartbeatInterval) clearInterval(state.heartbeatInterval);
    if (state.initTimeout) clearTimeout(state.initTimeout);
    if (state.renderDebounceTimer) cancelAnimationFrame(state.renderDebounceTimer);
    if (state.fallbackTimeout) clearTimeout(state.fallbackTimeout);
    state.reconnectTimer = state.heartbeatInterval = state.initTimeout = state.renderDebounceTimer = state.fallbackTimeout = null;
}

function closeWebSocket() {
    try { if (state.ws?.readyState === WebSocket.OPEN || state.ws?.readyState === WebSocket.CONNECTING) state.ws.close(); } catch (e) {}
}

async function connectLanyard() {
    const now = Date.now();
    if (now - state.lastConnectAttempt < CONFIG.CONNECT_DEBOUNCE) return;
    state.lastConnectAttempt = now;

    if (state.isConnecting || state.isConnected) return;

    clearTimers();
    closeWebSocket();
    state.isConnecting = true;

    if (!state.hasEverConnected && !cache.data) {
        state.fallbackTimeout = setTimeout(() => {
            if (!state.hasEverConnected && !cache.data) showConnectionError();
        }, CONFIG.FALLBACK_TIMEOUT);
    }

    // Show cached data IMMEDIATELY if available
    const cached = getCache();
    if (cached) {
        renderPresence(cached);  // Direct call
    }

    // Parallel fetch and WebSocket init
    const fetchPromise = !cached ? (async () => {
        try {
            const ac = new AbortController();
            const timeout = setTimeout(() => ac.abort(), CONFIG.REVALIDATE_TIMEOUT);
            const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`, { signal: ac.signal });
            clearTimeout(timeout);
            const json = await res.json();
            if (json?.success && json.data) {
                setCache(json.data);
                renderPresence(json.data);  // Direct call
            }
        } catch (err) { console.warn('Lanyard REST failed:', err); }
    })() : Promise.resolve();

    let ws;
    try { ws = new WebSocket('wss://api.lanyard.rest/socket'); } 
    catch (err) { state.isConnecting = false; scheduleReconnect(); return; }

    const sessionID = Date.now().toString(36) + Math.random().toString(36).slice(2);
    state.currentSessionID = sessionID;
    state.ws = ws;

    ws.onopen = () => {
        if (state.currentSessionID !== sessionID) return;
        state.isConnected = true;
        state.isConnecting = false;
        state.hasEverConnected = true;
        state.backoff = 1000;
        
        if (state.fallbackTimeout) clearTimeout(state.fallbackTimeout);
        
        state.initTimeout = setTimeout(() => {
            if (state.currentSessionID !== sessionID) return;
            state.isConnected = state.isConnecting = false;
            clearTimers(); closeWebSocket(); scheduleReconnect();
        }, CONFIG.INIT_TIMEOUT);
    };

    ws.onmessage = ({ data }) => {
        if (state.currentSessionID !== sessionID) return;
        let parsed;
        try { parsed = JSON.parse(data); } catch { return; }
        const { op, t, d } = parsed || {};
        
        if (op === 1 && d?.heartbeat_interval) {
            clearInterval(state.heartbeatInterval);
            state.heartbeatInterval = setInterval(() => {
                try { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ op: 3 })); } catch (e) {}
            }, d.heartbeat_interval);

            try { ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_USER_ID } })); } catch (e) {}
        }
        
        if (t === 'INIT_STATE') clearTimeout(state.initTimeout);
        
        if (t === 'INIT_STATE' || t === 'PRESENCE_UPDATE') {
            const presence = t === 'INIT_STATE' ? d[DISCORD_USER_ID] : d;
            if (presence?.discord_user) {
                setCache(presence);
                renderPresence(presence);  // Direct call
            }
        }
    };

    ws.onerror = () => {
        if (state.currentSessionID !== sessionID) return;
        state.isConnected = state.isConnecting = false;
        clearTimers(); closeWebSocket(); showConnectionError(); scheduleReconnect();
    };

    ws.onclose = () => {
        if (state.currentSessionID !== sessionID) return;
        state.isConnected = state.isConnecting = false;
        clearTimers(); showConnectionError(); scheduleReconnect();
    };

    // Wait for fetch to complete if needed
    await fetchPromise;
}

function scheduleReconnect() {
    if (state.reconnectTimer) return;
    const jitter = Math.floor(Math.random() * Math.min(1000, state.backoff));
    const wait = Math.min(state.backoff + jitter, CONFIG.MAX_BACKOFF);
    state.reconnectTimer = setTimeout(() => { state.reconnectTimer = null; connectLanyard(); }, wait);
    state.backoff = Math.min(Math.floor(state.backoff * 1.8), CONFIG.MAX_BACKOFF);
}

// ========================================
// START CONNECTION
// ========================================
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !state.isConnected && !state.isConnecting) {
        const cached = getCache();
        if (cached) renderPresence(cached);  // Direct call
        connectLanyard();
    }
});

const originalTitle = document.title;

// ========================================
// VISIBILITY CHANGE (DEBOUNCED)
// ========================================
document.addEventListener("visibilitychange", () => {
    clearTimeout(state.visibilityTimeout);
    
    state.visibilityTimeout = setTimeout(() => {
        if (document.hidden) {
            document.title = "JUST MONIKA";
            cleanupConnection();
        } else {
            document.title = originalTitle;
            connectLanyard();
        }
    }, 100);
});

// ========================================
// TYPEWRITER EFFECT
// ========================================
function initTypewriter() {
    if (!DOM.typeTarget || state.hasTyped) return;
    state.hasTyped = true;
    
    const textToType = "Every day, I imagine a future where I can be with you.";
    let typeIndex = 0;

    function typeWriter() {
        if (typeIndex < textToType.length) {
            DOM.typeTarget.textContent += textToType[typeIndex++];
            setTimeout(typeWriter, 50);
        } else {
            setTimeout(() => DOM.typeTarget.classList.remove('cursor'), 2000);
        }
    }

    setTimeout(typeWriter, 800);
}

// ========================================
// MENU TOGGLE
// ========================================
function initMenu() {
    const menuBtn = document.getElementById('menu-btn');
    const navOverlay = document.getElementById('nav-overlay');
    const logo = document.getElementById('site-logo');
    
    if (!menuBtn || !navOverlay || !logo) return;
    
    const icon = menuBtn.querySelector('i');
    if (!icon) return;
    
    let isMenuOpen = false;

    function toggleMenu() {
        isMenuOpen = !isMenuOpen;
        if (isMenuOpen) {
            navOverlay.classList.add('open');
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-xmark');
            icon.style.transform = 'rotate(90deg)';
            document.body.style.overflow = 'hidden';
            logo.classList.add('opacity-0', 'pointer-events-none');
        } else {
            navOverlay.classList.remove('open');
            icon.classList.remove('fa-xmark');
            icon.classList.add('fa-bars');
            icon.style.transform = 'rotate(0deg)';
            document.body.style.overflow = 'auto';
            logo.classList.remove('opacity-0', 'pointer-events-none');
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
}

// ========================================
// MONIKA POPUP
// ========================================
function initMonikaPopup() {
    const monikaHero = document.getElementById('monika-hero');
    const monikaPopup = document.getElementById('monika-popup');
    const monikaOkBtn = document.getElementById('monika-ok-btn');

    if (!monikaHero || !monikaPopup || !monikaOkBtn) return;

    monikaHero.addEventListener('click', () => {
        monikaPopup.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    });

    monikaOkBtn.addEventListener('click', () => {
        monikaPopup.classList.add('hidden');
        document.body.style.overflow = 'auto';
    });
}

// ========================================
// INITIALIZATION
// ========================================
document.addEventListener('DOMContentLoaded', () => {
    // Cache DOM elements
    DOM.card = document.getElementById('discord-profile');
    DOM.avatar = document.getElementById('d-avatar');
    DOM.name = document.getElementById('d-global-name');
    DOM.username = document.getElementById('d-username');
    DOM.activity = document.getElementById('d-activity');
    DOM.statusInd = document.getElementById('d-status-indicator');
    DOM.videoBg = document.getElementById('d-bg-video');
    DOM.imgBg = document.getElementById('d-bg-image');
    DOM.typeTarget = document.getElementById('typed-quote');
    DOM.year = document.getElementById('year');

    // Set year
    if (DOM.year) {
        DOM.year.textContent = new Date().getFullYear();
    }

    // Initialize features
    initTypewriter();
    initMenu();
    initMonikaPopup();
    
    // Start Lanyard connection
    connectLanyard();
});
