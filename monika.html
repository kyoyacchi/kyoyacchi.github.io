    <script>
      const textToType = "Every day, I imagine a future where I can be with you.";
        const typeTarget = document.getElementById('typed-quote');
        let typeIndex = 0;

        function typeWriter() {
            if (typeIndex < textToType.length) {
                typeTarget.textContent += textToType.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeWriter, 50); 
            } else {

                setTimeout(() => typeTarget.classList.remove('cursor'), 2000);
            }
        }
        

        setTimeout(typeWriter, 800);
      
      
        document.getElementById('year').textContent = new Date().getFullYear();

        const DISCORD_USER_ID = '468509605828493322';
        const CONFIG = {
            MAX_BACKOFF: 30000,
            CACHE_TTL: 60000 * 5,
            SWR_THRESHOLD: 120000,
            CONNECT_DEBOUNCE: 1500,
            INIT_TIMEOUT: 10000,
            REVALIDATE_TIMEOUT: 8000,
            RENDER_DEBOUNCE: 150,
            FALLBACK_TIMEOUT: 8000
        };

        const state = {
            ws: null,
            isConnected: false,
            isConnecting: false,
            reconnectTimer: null,
            heartbeatInterval: null,
            backoff: 1000,
            currentSessionID: null,
            lastConnectAttempt: 0,
            renderDebounceTimer: null
        };

        const storageKey = `lanyard_cache_${DISCORD_USER_ID}`;

        function getCache() {
            try {
                const stored = localStorage.getItem(storageKey);
                if (!stored) return null;
                const { data } = JSON.parse(stored);
                return data;
            } catch (e) {
                return null;
            }
        }

        function setCache(data) {
            try {
                localStorage.setItem(storageKey, JSON.stringify({
                    data: data,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        }

        function debouncedRenderPresence(data) {
            if (state.renderDebounceTimer) {
                cancelAnimationFrame(state.renderDebounceTimer);
            }
            state.renderDebounceTimer = requestAnimationFrame(() => {
                renderPresence(data);
                state.renderDebounceTimer = null;
            });
        }

        function renderPresence(data) {
            const card = document.getElementById('discord-profile');
            const avatarEl = document.getElementById('d-avatar');
            const nameEl = document.getElementById('d-global-name');
            const userEl = document.getElementById('d-username');
            const activityEl = document.getElementById('d-activity');
            const statusInd = document.getElementById('d-status-indicator');
            const videoBg = document.getElementById('d-bg-video');
            const imgBg = document.getElementById('d-bg-image');

            if (!data || !data.discord_user) return;

            const user = data.discord_user;
            const status = data.discord_status || 'offline';

            card.classList.remove('opacity-0');

            const avatarUrl = user.avatar 
                ? `https://wsrv.nl/?url=https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=256`
                : `https://wsrv.nl/?url=https://cdn.discordapp.com/embed/avatars/0.png`;

            if (avatarEl.src !== avatarUrl) avatarEl.src = avatarUrl;

            statusInd.className = `status-indicator status-${status}`;

            nameEl.textContent = user.global_name || user.username;
            userEl.textContent = '@' + user.username;

            let activityText = "OFFLINE";
            let colorClass = "text-white";

                        if (status !== 'offline') {
                const activities = data.activities || [];
                const game = activities.find(a => a.type === 0 || a.type === 1);

                const listeningActivity = activities.find(a => a.type === 2);

                if (game) {
                    activityText = "PLAYING " + game.name.toUpperCase();
                    colorClass = "text-kyo-emerald";
                } else if (listeningActivity) {


                    activityText = "LISTENING TO " + listeningActivity.name.toUpperCase();
                    colorClass = "text-kyo-emerald";
                } else {
                    activityText = status.toUpperCase();
                    if(status === 'dnd') activityText = "DO NOT DISTURB";
                }
            }

            activityEl.textContent = activityText;
activityEl.className = `text-[10px] md:text-xs font-bold tracking-widest uppercase px-3 py-2 rounded-xl bg-white/10 border border-white/5 backdrop-blur-md whitespace-normal break-words w-fit max-w-full leading-relaxed ${colorClass === 'text-kyo-emerald' ? 'text-kyo-emerald border-kyo-emerald/20' : 'text-white'}`;

            
            let videoUrl = null;
            if (user.collectibles && user.collectibles.nameplate && user.collectibles.nameplate.asset) {
                videoUrl = `https://kyopi.vercel.app/api/proxy?url=https://cdn.discordapp.com/assets/collectibles/${user.collectibles.nameplate.asset}asset.webm`;
            }

            if (videoUrl) {
                if (videoBg.src !== videoUrl) videoBg.src = videoUrl;
                videoBg.classList.remove('hidden');
                imgBg.classList.add('hidden');
            } else if (user.banner) {
                const bannerUrl = `https://kyopi.vercel.app/api/proxy?url=https://cdn.discordapp.com/banners/${user.id}/${user.banner}.${user.banner.startsWith('a_') ? 'gif' : 'png'}?size=1024`;
                imgBg.src = bannerUrl;
                imgBg.classList.remove('hidden');
                videoBg.classList.add('hidden');
            } else {
                imgBg.style.background = '#50c878';
                imgBg.src = '';
                imgBg.classList.remove('hidden');
                videoBg.classList.add('hidden');
            }
        }

        async function connectLanyard() {
            const now = Date.now();
            if (now - state.lastConnectAttempt < CONFIG.CONNECT_DEBOUNCE) return;
            state.lastConnectAttempt = now;

            if (state.isConnecting || state.isConnected) return;
            state.isConnecting = true;

            const cached = getCache();
            if (cached) {
                debouncedRenderPresence(cached);
            }

            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
                const json = await res.json();
                if (json.success && json.data) {
                    setCache(json.data);
                    debouncedRenderPresence(json.data);
                }
            } catch (e) {}

            let ws;
            try {
                ws = new WebSocket('wss://api.lanyard.rest/socket');
            } catch (err) {
                state.isConnecting = false;
                scheduleReconnect();
                return;
            }

            const sessionID = Date.now().toString(36);
            state.currentSessionID = sessionID;
            state.ws = ws;

            ws.onopen = () => {
                if (state.currentSessionID !== sessionID) return;
                state.isConnected = true;
                state.isConnecting = false;
                state.backoff = 1000;
                ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_USER_ID } }));
            };

            ws.onmessage = ({ data }) => {
                if (state.currentSessionID !== sessionID) return;
                try {
                    const parsed = JSON.parse(data);
                    const { op, t, d } = parsed;

                    if (op === 1) {
                        clearInterval(state.heartbeatInterval);
                        state.heartbeatInterval = setInterval(() => {
                            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ op: 3 }));
                        }, d.heartbeat_interval);
                    }

                    if (t === 'INIT_STATE' || t === 'PRESENCE_UPDATE') {
                        const presence = t === 'INIT_STATE' ? d[DISCORD_USER_ID] : d;
                        if (presence) {
                            setCache(presence);
                            debouncedRenderPresence(presence);
                        }
                    }
                } catch (e) {}
            };

            ws.onerror = () => {
                if (state.currentSessionID !== sessionID) return;
                state.isConnected = false;
                state.isConnecting = false;
                ws.close();
                scheduleReconnect();
            };

            ws.onclose = () => {
                if (state.currentSessionID !== sessionID) return;
                state.isConnected = false;
                state.isConnecting = false;
                scheduleReconnect();
            };
        }

        function scheduleReconnect() {
            if (state.reconnectTimer) return;
            const jitter = Math.floor(Math.random() * 1000);
            const wait = Math.min(state.backoff + jitter, CONFIG.MAX_BACKOFF);
            state.reconnectTimer = setTimeout(() => {
                state.reconnectTimer = null;
                connectLanyard();
            }, wait);
            state.backoff = Math.min(state.backoff * 1.5, CONFIG.MAX_BACKOFF);
        }

        document.addEventListener('DOMContentLoaded', () => {
            connectLanyard();
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !state.isConnected) {
                connectLanyard();
            }
        });

        const menuBtn = document.getElementById('menu-btn');
        const navOverlay = document.getElementById('nav-overlay');
        const icon = menuBtn.querySelector('i');
        const logo = document.getElementById('site-logo');
        let isMenuOpen = false;

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                navOverlay.classList.add('open');
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
                icon.style.transform = 'rotate(90deg)';
                document.body.style.overflow = 'hidden';
                logo.classList.add('opacity-0', 'pointer-events-none');
            } else {
                navOverlay.classList.remove('open');
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
                icon.style.transform = 'rotate(0deg)';
                document.body.style.overflow = 'auto';
                logo.classList.remove('opacity-0', 'pointer-events-none');
            }
        }

        menuBtn.addEventListener('click', toggleMenu);

        // Original Monika Popup
        const monikaHero = document.getElementById('monika-hero');
        const monikaPopup = document.getElementById('monika-popup');
        const monikaOkBtn = document.getElementById('monika-ok-btn');

        document.body.style.overflow = 'auto';

        if(monikaHero && monikaPopup && monikaOkBtn) {
            monikaHero.addEventListener('click', () => {
                monikaPopup.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            });
            monikaOkBtn.addEventListener('click', () => {
                monikaPopup.classList.add('hidden');
                document.body.style.overflow = 'auto';
            });
        }

        // --- NEW SECRET EASTER EGG POPUP --- //
        let cachedDiscordBannerUrl = null;

        async function fetchDiscordBanner() {
            if (cachedDiscordBannerUrl) return cachedDiscordBannerUrl;

            try {
                const response = await fetch(`https://kyopi.vercel.app/api/discord?id=${DISCORD_USER_ID}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                if (data && data.banner) {
                    cachedDiscordBannerUrl = data.banner;
                    return cachedDiscordBannerUrl;
                }
            } catch (error) {
                console.error('Failed to fetch Discord banner:', error);
            }
            return null;
        }

        const footerKyo = document.getElementById('footer-kyo');
        const secretPopup = document.getElementById('secret-profile-popup');
        const secretPopupContent = document.getElementById('secret-popup-content');
        const secretBanner = document.getElementById('secret-banner');
        const secretAvatar = document.getElementById('secret-avatar');
        const secretCloseBtn = document.getElementById('secret-close-btn');
        
        let clickCount = 0;
        let clickTimer = null;
        let isSecretOpen = false;

        footerKyo.addEventListener('click', (e) => {
            e.preventDefault(); 
            clickCount++;
            
            // Allow double/single click logic, execute default navigation if less than 3
            if (clickCount === 1) {
                clickTimer = setTimeout(() => {
                    if (clickCount < 3) {
             //           window.open(footerKyo.href, '_blank');
                    }
                    clickCount = 0;
                }, 500); // 500ms window to click 3 times
            }
            
            // Trigger Easter Egg on 3rd click
            if (clickCount === 3) {
                clearTimeout(clickTimer);
                clickCount = 0;
            //    openSecretPopup();
            }
        });

        async function openSecretPopup() {
            if (isSecretOpen) return;
            isSecretOpen = true;
            
            // Sync Avatar with Discord profile on the page
            const mainAvatarSrc = document.getElementById('d-avatar').src;
            secretAvatar.src = mainAvatarSrc;
            
            document.body.style.overflow = 'hidden';
            
            // Show popup & Trigger Animation
            secretPopup.classList.remove('hidden');
            void secretPopup.offsetWidth; // Force CSS reflow to ensure animation runs
            secretPopup.classList.remove('opacity-0');
            secretPopup.classList.add('opacity-100');
            
            secretPopupContent.classList.remove('scale-95');
            secretPopupContent.classList.add('scale-100');
            
            // Try fetching the user banner
            const bannerUrl = await fetchDiscordBanner();
            if(bannerUrl) {
                secretBanner.style.backgroundImage = `url('${bannerUrl}')`;
            } else {
                // Thematic Fallback 
                secretBanner.style.backgroundImage = `linear-gradient(135deg, rgba(80, 200, 120, 0.4) 0%, rgba(10, 10, 12, 100%) 100%)`;
            }
        }

        function closeSecretPopup() {
            secretPopup.classList.remove('opacity-100');
            secretPopup.classList.add('opacity-0');
            secretPopupContent.classList.remove('scale-100');
            secretPopupContent.classList.add('scale-95');
            
            // Wait for tailwind duration-300 before hiding element
            setTimeout(() => {
                secretPopup.classList.add('hidden');
                document.body.style.overflow = 'auto';
                isSecretOpen = false;
            }, 300);
        }

        secretCloseBtn.addEventListener('click', closeSecretPopup);
        
        // Close on outside click
        secretPopup.addEventListener('click', (e) => {
            if (e.target === secretPopup) closeSecretPopup();
        });
        
        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isSecretOpen) closeSecretPopup();
        });
    </script>
</body>
